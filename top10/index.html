<!DOCTYPE html>
<html lang="ca">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="site-navbar"></div>

  <div class="container">
    <header class="game-header">
      <div class="header-content">
        <h1>FUTBOL 11 <span class="highlight">- TOP 10</span></h1>
        <h2 id="categoryTitle" class="category-title">Carregant categoria...</h2>
      </div>
    </header>

    <main class="game-area">
      <div class="top-list" id="topList">
        <!-- Generat per JS -->
        <div class="list-item skeleton"></div>
        <div class="list-item skeleton"></div>
        <div class="list-item skeleton"></div>
        <div class="list-item skeleton"></div>
        <div class="list-item skeleton"></div>
        <div class="list-item skeleton"></div>
        <div class="list-item skeleton"></div>
        <div class="list-item skeleton"></div>
        <div class="list-item skeleton"></div>
        <div class="list-item skeleton"></div>
      </div>

      <div class="controls-panel">
        <div class="input-section">
          <div class="autocomplete-wrapper">
            <input type="text" id="guessInput" placeholder="Escriu el nom d'un jugador..." autocomplete="off">
            <ul id="autocompleteList" class="autocomplete-list hidden"></ul>
          </div>
          <button id="guessBtn" class="primary-btn">
            <svg viewBox="0 0 24 24" width="24" height="24">
              <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
            </svg>
          </button>
        </div>
        <div id="status" class="status-msg"></div>

        <div class="action-buttons">
          <button id="giveUpBtn" class="danger-btn">Rendir-se</button>
          <button id="nextBtn" class="secondary-btn">Categoria Aleatòria</button>
        </div>
      </div>
    </main>
  </div>

  <script>console.log("Loading scripts...");</script>
  <script src="../navbar.js" onload="console.log('navbar.js loaded')"></script>
  <script src="../players.js" onload="console.log('players.js loaded')"></script>
  <script src="categories.js" onload="console.log('categories.js loaded')"></script>
  <script src="game.js" onload="console.log('game.js loaded')"></script>
</body>

</html>
