<!DOCTYPE html>
<html lang="ca">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Futbol 11 Grid</title>
  <link rel="stylesheet" href="grid.css">
</head>

<body>
  <div class="container">
    <header class="game-header">
      <div class="header-content">
        <h1>FUTBOL 11 GRID</h1>
        <div class="header-stats">
          <div id="score" class="score-badge">Completades: 0/9</div>
          <div id="meta" class="meta-info">Jugades: 0</div>
        </div>
      </div>
    </header>

    <main class="game-area">
      <div class="board-container">
        <div id="gridBoard" class="grid-board">
          <!-- El tauler es genera dinàmicament -->
        </div>
      </div>

      <div class="controls-panel">
        <div class="input-section">
          <div class="autocomplete-wrapper">
            <input type="text" id="guessInput" placeholder="Escriu el nom d'un jugador..." autocomplete="off">
            <ul id="autocompleteList" class="autocomplete-list hidden"></ul>
          </div>
          <button id="guessBtn" class="primary-btn">Enviar</button>
        </div>

        <div id="status" class="status-msg"></div>

        <div class="action-buttons">
          <button id="randomBtn" class="secondary-btn">Grid Aleatori</button>
          <button id="customBtn" class="secondary-btn">Grid a mida</button>
          <button id="repeatCustomBtn" class="secondary-btn" style="display:none;">Repetir grid a mida </button>
          <button id="surrenderBtn" class="danger-btn">Rendir-se</button>
          <button id="clearBtn" class="outline-btn">Netejar</button>
        </div>
      </div>
    </main>

    <div id="choicePanel" class="choice-panel hidden">
      <div class="choice-content">
        <h3 id="choiceTitle">Tria una casella:</h3>
        <div id="choiceList" class="choice-options"></div>
        <button id="choiceCancel" class="outline-btn">Cancel·lar</button>
      </div>
    </div>

    <!-- Modal per a Grid Personalitzat -->
    <div id="customGridModal" class="modal hidden">
      <div class="modal-content">
        <h3>Configura el teu Grid</h3>
        <p class="modal-desc">Tria la quantitat exacta de cada tipus per a les columnes (total 3):</p>

        <div class="config-form">
          <div class="form-group">
            <label for="selTeams">Equips:</label>
            <select id="selTeams">
              <option value="any">Qualsevol</option>
              <option value="0">Cap</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </div>
          <div class="form-group">
            <label for="selCountries">Països:</label>
            <select id="selCountries">
              <option value="any">Qualsevol</option>
              <option value="0">Cap</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </div>
          <div class="form-group">
            <label for="selPositions">Posicions:</label>
            <select id="selPositions">
              <option value="any">Qualsevol</option>
              <option value="0">Cap</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </div>
        </div>

        <div class="modal-actions">
          <button id="btnGenerateCustom" class="primary-btn">Generar</button>
          <button id="btnCancelCustom" class="outline-btn">Tancar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="players.js"></script>
  <script src="app.js"></script>
</body>

</html>
