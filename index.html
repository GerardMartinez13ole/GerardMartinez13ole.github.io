<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio | Futbol Grid</title>
  <style>
    :root {
      --bg-a: #091525;
      --bg-b: #122844;
      --ink: #f3f9ff;
      --line: #2e4e74;
      --accent: #0fd2ff;
      --accent-2: #ffcc4d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 10% -20%, #245787 0%, transparent 60%),
        radial-gradient(900px 520px at 100% 0%, #133a63 0%, transparent 60%),
        linear-gradient(180deg, var(--bg-a), var(--bg-b));
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .center-stage {
      min-height: calc(100vh - 74px);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .go-grid {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: min(90vw, 340px);
      padding: 16px 24px;
      border-radius: 999px;
      font-size: clamp(1.05rem, 2.2vw, 1.3rem);
      font-weight: 900;
      letter-spacing: 0.5px;
      color: #072035;
      border: 1px solid #8ef0ff;
      background: linear-gradient(180deg, #2be0ff, #00b9df);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.3);
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .game-links {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .go-grid.top10 {
      background: linear-gradient(180deg, #ffcc4d, #ffa000);
      border-color: #ffeb3b;
    }

    .go-grid:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    @media (max-width: 640px) {
      .center-stage {
        min-height: calc(100vh - 118px);
      }
    }
  </style>
</head>
<body>
  <div id="site-navbar"></div>

  <main class="center-stage">
    <div class="game-links">
      <a class="go-grid" href="grid/grid.html">Ir al Grid</a>
      <a class="go-grid top10" href="top10/index.html">Top 10</a>
    </div>
  </main>

  <script src="navbar.js"></script>
</body>
</html>
