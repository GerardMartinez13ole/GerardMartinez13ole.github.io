<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid de La Liga</title>
  <style>
    :root {
      --bg: #f6f4ee;
      --card: #ffffff;
      --line: #d8d2c4;
      --ink: #1c1c1c;
      --muted: #5b5b5b;
      --ok: #19753a;
      --bad: #b3261e;
      --btn: #ece7db;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f8f6f1, #efe9db);
      padding: 16px;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 12px;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    button {
      border: 1px solid #bdb5a2;
      border-radius: 999px;
      padding: 8px 12px;
      background: var(--btn);
      cursor: pointer;
      font-weight: 600;
    }

    .meta {
      margin-left: auto;
      font-size: 14px;
      color: #444;
    }

    .board {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 650px;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 8px;
      vertical-align: top;
    }

    th {
      background: #f2ecdf;
      text-align: center;
    }

    .row-head {
      text-align: left;
      width: 190px;
    }

    .cell input {
      width: 100%;
      border: 1px solid #cdc7ba;
      border-radius: 8px;
      padding: 7px;
      font-size: 14px;
    }

    .hint {
      margin-top: 4px;
      font-size: 12px;
      color: #636363;
      min-height: 16px;
    }

    .status {
      margin-top: 4px;
      font-size: 12px;
      font-weight: 700;
      min-height: 16px;
    }

    .cell.ok input {
      border-color: var(--ok);
      background: #eff9f1;
    }

    .cell.ok .status { color: var(--ok); }

    .cell.bad input {
      border-color: var(--bad);
      background: #fff0ef;
    }

    .cell.bad .status { color: var(--bad); }

    .score {
      margin-top: 12px;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      .meta {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Grid de La Liga</h1>
    <p class="subtitle">Escribe un jugador que haya jugado en ambos clubes en cada casilla. No repitas nombres.</p>

    <div class="toolbar">
      <button id="dailyBtn" type="button">Reto de hoy</button>
      <button id="randomBtn" type="button">Grid aleatorio</button>
      <button id="checkBtn" type="button">Comprobar</button>
      <button id="clearBtn" type="button">Limpiar</button>
      <button id="hintBtn" type="button">Pistas</button>
      <span class="meta" id="meta">Intentos: 0</span>
    </div>

    <div class="board">
      <table id="gridTable"></table>
    </div>

    <p class="score" id="score">Aun no has comprobado el tablero.</p>
  </main>

  <script>
    const PLAYERS = [
      { name: "Luis Figo", teams: ["Barcelona", "Real Madrid"], aliases: ["figo"] },
      { name: "Ronaldo Nazario", teams: ["Barcelona", "Real Madrid"], aliases: ["ronaldo"] },
      { name: "Michael Laudrup", teams: ["Barcelona", "Real Madrid"], aliases: ["laudrup"] },
      { name: "Samuel Eto'o", teams: ["Mallorca", "Real Madrid", "Barcelona"], aliases: ["etoo"] },
      { name: "Dani Alves", teams: ["Sevilla", "Barcelona"] },
      { name: "Ivan Rakitic", teams: ["Sevilla", "Barcelona"], aliases: ["rakitic"] },
      { name: "Jules Kounde", teams: ["Sevilla", "Barcelona"], aliases: ["kounde"] },
      { name: "Clement Lenglet", teams: ["Sevilla", "Barcelona"], aliases: ["lenglet"] },
      { name: "Sergio Ramos", teams: ["Sevilla", "Real Madrid"], aliases: ["ramos"] },
      { name: "Isco", teams: ["Malaga", "Real Madrid", "Sevilla"] },
      { name: "Sergio Reguilon", teams: ["Sevilla", "Real Madrid", "Atletico Madrid"], aliases: ["reguilon"] },
      { name: "Kevin Gameiro", teams: ["Sevilla", "Atletico Madrid", "Valencia"], aliases: ["gameiro"] },
      { name: "Geoffrey Kondogbia", teams: ["Valencia", "Atletico Madrid", "Sevilla"], aliases: ["kondogbia"] },
      { name: "Ever Banega", teams: ["Valencia", "Sevilla"], aliases: ["banega"] },
      { name: "Adil Rami", teams: ["Valencia", "Sevilla"], aliases: ["rami"] },
      { name: "David Villa", teams: ["Valencia", "Barcelona", "Atletico Madrid"], aliases: ["villa"] },
      { name: "Jordi Alba", teams: ["Valencia", "Barcelona"], aliases: ["alba"] },
      { name: "Paco Alcacer", teams: ["Valencia", "Barcelona"], aliases: ["alcacer"] },
      { name: "Andre Gomes", teams: ["Valencia", "Barcelona"], aliases: ["gomes"] },
      { name: "Jeison Murillo", teams: ["Valencia", "Barcelona"], aliases: ["murillo"] },
      { name: "Raul Albiol", teams: ["Valencia", "Real Madrid", "Villarreal"], aliases: ["albiol"] },
      { name: "Sergio Canales", teams: ["Valencia", "Real Madrid", "Real Betis"], aliases: ["canales"] },
      { name: "Denis Cheryshev", teams: ["Real Madrid", "Valencia", "Villarreal"], aliases: ["cheryshev"] },
      { name: "Fernando Morientes", teams: ["Real Madrid", "Valencia"], aliases: ["morientes"] },
      { name: "Alvaro Morata", teams: ["Real Madrid", "Atletico Madrid"], aliases: ["morata"] },
      { name: "Marcos Llorente", teams: ["Real Madrid", "Atletico Madrid"], aliases: ["llorente"] },
      { name: "Theo Hernandez", teams: ["Real Madrid", "Atletico Madrid", "Real Sociedad"], aliases: ["theo"] },
      { name: "Antoine Griezmann", teams: ["Real Sociedad", "Atletico Madrid", "Barcelona"], aliases: ["griezmann"] },
      { name: "Martin Odegaard", teams: ["Real Sociedad", "Real Madrid"], aliases: ["odegaard"] },
      { name: "Asier Illarramendi", teams: ["Real Sociedad", "Real Madrid"], aliases: ["illarramendi"] },
      { name: "Esteban Granero", teams: ["Real Sociedad", "Real Madrid", "Espanyol"], aliases: ["granero"] },
      { name: "Robin Le Normand", teams: ["Real Sociedad", "Atletico Madrid"], aliases: ["le normand"] },
      { name: "Arda Turan", teams: ["Atletico Madrid", "Barcelona"], aliases: ["arda"] },
      { name: "Memphis Depay", teams: ["Atletico Madrid", "Barcelona"], aliases: ["depay"] },
      { name: "Joao Felix", teams: ["Atletico Madrid", "Barcelona"], aliases: ["felix"] },
      { name: "Luis Suarez", teams: ["Barcelona", "Atletico Madrid"], aliases: ["suarez"] },
      { name: "Dani Parejo", teams: ["Valencia", "Villarreal"], aliases: ["parejo"] },
      { name: "Francis Coquelin", teams: ["Valencia", "Villarreal"], aliases: ["coquelin"] },
      { name: "Gabriel Paulista", teams: ["Valencia", "Villarreal"], aliases: ["paulista"] },
      { name: "Rodri", teams: ["Atletico Madrid", "Villarreal"] },
      { name: "Diego Godin", teams: ["Atletico Madrid", "Villarreal"], aliases: ["godin"] },
      { name: "Joan Capdevila", teams: ["Espanyol", "Atletico Madrid", "Villarreal"], aliases: ["capdevila"] },
      { name: "Gerard Moreno", teams: ["Villarreal", "Espanyol"], aliases: ["gerard"] },
      { name: "Carlos Bacca", teams: ["Sevilla", "Villarreal"], aliases: ["bacca"] },
      { name: "Denis Suarez", teams: ["Barcelona", "Villarreal", "Celta Vigo"], aliases: ["denis"] },
      { name: "Munir El Haddadi", teams: ["Barcelona", "Valencia", "Sevilla"], aliases: ["munir"] },
      { name: "Jasper Cillessen", teams: ["Barcelona", "Valencia"], aliases: ["cillessen"] },
      { name: "Nolito", teams: ["Barcelona", "Celta Vigo"] },
      { name: "Santi Mina", teams: ["Valencia", "Celta Vigo"], aliases: ["mina"] },
      { name: "Iago Aspas", teams: ["Celta Vigo", "Sevilla"], aliases: ["aspas"] },
      { name: "Juanfran", teams: ["Atletico Madrid", "Espanyol"] },
      { name: "Mario Suarez", teams: ["Atletico Madrid", "Valencia"], aliases: ["mario suarez"] },
      { name: "Vitolo", teams: ["Sevilla", "Atletico Madrid"] },
      { name: "Diego Costa", teams: ["Atletico Madrid", "Celta Vigo"], aliases: ["costa"] },
      { name: "Rafinha Alcantara", teams: ["Barcelona", "Celta Vigo"], aliases: ["rafinha"] }
    ];

    const STORAGE_KEY = "laliga-grid-progress-v2";

    const tableEl = document.getElementById("gridTable");
    const scoreEl = document.getElementById("score");
    const metaEl = document.getElementById("meta");
    const hintBtn = document.getElementById("hintBtn");

    const state = {
      hints: false,
      attempts: 0,
      rows: [],
      cols: [],
      teams: [],
      boardKey: "",
      boardLabel: "",
      byKey: new Map(),
      lookup: new Map(),
      pairMap: new Map()
    };

    function normalizeName(value) {
      return value
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9 ]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function pairKey(a, b) {
      return [a, b].sort().join("|");
    }

    function hashText(text) {
      let h = 2166136261;
      for (let i = 0; i < text.length; i += 1) {
        h ^= text.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function mulberry32(seed) {
      let t = seed >>> 0;
      return function () {
        t += 0x6D2B79F5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function addLookupEntry(alias, playerKey) {
      const normalized = normalizeName(alias);
      if (!normalized) {
        return;
      }

      if (!state.lookup.has(normalized)) {
        state.lookup.set(normalized, playerKey);
        return;
      }

      if (state.lookup.get(normalized) !== playerKey) {
        state.lookup.set(normalized, null);
      }
    }

    function buildIndex() {
      state.byKey.clear();
      state.lookup.clear();
      state.pairMap.clear();

      for (const player of PLAYERS) {
        const key = normalizeName(player.name);
        const entry = {
          key,
          name: player.name,
          teams: [...player.teams]
        };

        state.byKey.set(key, entry);
        addLookupEntry(player.name, key);

        if (Array.isArray(player.aliases)) {
          for (const alias of player.aliases) {
            addLookupEntry(alias, key);
          }
        }

        for (let i = 0; i < player.teams.length; i += 1) {
          for (let j = i + 1; j < player.teams.length; j += 1) {
            const keyPair = pairKey(player.teams[i], player.teams[j]);
            if (!state.pairMap.has(keyPair)) {
              state.pairMap.set(keyPair, []);
            }
            state.pairMap.get(keyPair).push(entry.key);
          }
        }
      }

      const connectivity = new Map();
      for (const [keyPair, players] of state.pairMap.entries()) {
        if (players.length < 2) {
          continue;
        }
        const clubs = keyPair.split("|");
        connectivity.set(clubs[0], (connectivity.get(clubs[0]) || 0) + 1);
        connectivity.set(clubs[1], (connectivity.get(clubs[1]) || 0) + 1);
      }

      state.teams = [...connectivity.entries()]
        .filter((entry) => entry[1] >= 4)
        .map((entry) => entry[0])
        .sort();
    }

    function optionsForPair(a, b) {
      return state.pairMap.get(pairKey(a, b)) || [];
    }

    function pickUnique(list, amount, random) {
      const pool = [...list];
      for (let i = pool.length - 1; i > 0; i -= 1) {
        const j = Math.floor(random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, amount);
    }

    function canSolveWithoutRepeats(rows, cols) {
      const cells = [];

      for (const row of rows) {
        for (const col of cols) {
          const options = [...new Set(optionsForPair(row, col))];
          if (!options.length) {
            return false;
          }
          cells.push(options);
        }
      }

      cells.sort((a, b) => a.length - b.length);
      const used = new Set();

      function backtrack(index) {
        if (index >= cells.length) {
          return true;
        }

        const options = cells[index];
        for (const playerKey of options) {
          if (used.has(playerKey)) {
            continue;
          }

          used.add(playerKey);

          let impossible = false;
          for (let i = index + 1; i < cells.length; i += 1) {
            const hasAvailable = cells[i].some((key) => !used.has(key));
            if (!hasAvailable) {
              impossible = true;
              break;
            }
          }

          if (!impossible && backtrack(index + 1)) {
            return true;
          }

          used.delete(playerKey);
        }

        return false;
      }

      return backtrack(0);
    }

    function generateBoard(seed) {
      const random = mulberry32(seed);
      const MAX_TRIES = 1400;
      let best = null;

      for (let attempt = 0; attempt < MAX_TRIES; attempt += 1) {
        const rows = pickUnique(state.teams, 3, random);
        const cols = pickUnique(state.teams.filter((team) => !rows.includes(team)), 3, random);

        let valid = true;
        let richness = 0;
        let minOptions = Infinity;

        for (const row of rows) {
          for (const col of cols) {
            const count = new Set(optionsForPair(row, col)).size;
            if (!count) {
              valid = false;
              break;
            }
            minOptions = Math.min(minOptions, count);
            richness += Math.min(count, 8);
          }
          if (!valid) {
            break;
          }
        }

        if (!valid || minOptions < 2) {
          continue;
        }

        if (!canSolveWithoutRepeats(rows, cols)) {
          continue;
        }

        const score = richness + minOptions * 4 + random();
        if (!best || score > best.score) {
          best = { rows, cols, score };
        }
      }

      if (!best) {
        throw new Error("No se pudo generar un tablero valido.");
      }

      return best;
    }

    function updateMeta() {
      const label = state.boardLabel ? " | " + state.boardLabel : "";
      metaEl.textContent = "Intentos: " + state.attempts + label;
    }

    function refreshHintButton() {
      hintBtn.textContent = state.hints ? "Ocultar pistas" : "Pistas";
    }

    function refreshHints() {
      tableEl.querySelectorAll(".cell").forEach((cell) => {
        const row = state.rows[Number(cell.dataset.row)];
        const col = state.cols[Number(cell.dataset.col)];
        const hintText = state.hints ? new Set(optionsForPair(row, col)).size + " opciones" : "";
        cell.querySelector(".hint").textContent = hintText;
      });
    }

    function clearCellVisual(cell) {
      cell.classList.remove("ok", "bad");
      cell.querySelector(".status").textContent = "";
    }

    function getCells() {
      return [...tableEl.querySelectorAll(".cell")];
    }

    function collectValues() {
      return getCells().map((cell) => cell.querySelector("input").value || "");
    }

    function applyValues(values) {
      const cells = getCells();
      cells.forEach((cell, index) => {
        const value = Array.isArray(values) ? (values[index] || "") : "";
        cell.querySelector("input").value = value;
        clearCellVisual(cell);
      });
    }

    function saveProgress() {
      if (!state.boardKey) {
        return;
      }

      const payload = {
        boardKey: state.boardKey,
        rows: [...state.rows],
        cols: [...state.cols],
        attempts: state.attempts,
        hints: state.hints,
        values: collectValues()
      };

      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch (_) {
        // localStorage puede no estar disponible; el juego sigue funcionando.
      }
    }

    function loadProgress(boardKey) {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return null;
        }

        const data = JSON.parse(raw);
        if (!data || data.boardKey !== boardKey) {
          return null;
        }

        const sameRows = Array.isArray(data.rows) && data.rows.join("|") === state.rows.join("|");
        const sameCols = Array.isArray(data.cols) && data.cols.join("|") === state.cols.join("|");
        if (!sameRows || !sameCols) {
          return null;
        }

        return data;
      } catch (_) {
        return null;
      }
    }

    function resolvePlayer(inputValue) {
      const key = normalizeName(inputValue || "");
      if (!key) {
        return { type: "empty" };
      }

      if (!state.lookup.has(key)) {
        return { type: "unknown" };
      }

      const playerKey = state.lookup.get(key);
      if (playerKey === null) {
        return { type: "ambiguous" };
      }

      return { type: "ok", player: state.byKey.get(playerKey) };
    }

    function checkBoard() {
      state.attempts += 1;
      updateMeta();

      let validCount = 0;
      const used = new Set();

      getCells().forEach((cell) => {
        clearCellVisual(cell);

        const row = state.rows[Number(cell.dataset.row)];
        const col = state.cols[Number(cell.dataset.col)];
        const inputEl = cell.querySelector("input");
        const statusEl = cell.querySelector(".status");
        const result = resolvePlayer(inputEl.value);

        if (result.type === "empty") {
          cell.classList.add("bad");
          statusEl.textContent = "Vacio";
          return;
        }

        if (result.type === "unknown") {
          cell.classList.add("bad");
          statusEl.textContent = "No reconocido";
          return;
        }

        if (result.type === "ambiguous") {
          cell.classList.add("bad");
          statusEl.textContent = "Nombre ambiguo";
          return;
        }

        if (used.has(result.player.key)) {
          cell.classList.add("bad");
          statusEl.textContent = "Repetido";
          return;
        }

        if (!result.player.teams.includes(row) || !result.player.teams.includes(col)) {
          cell.classList.add("bad");
          statusEl.textContent = "No coincide";
          return;
        }

        used.add(result.player.key);
        validCount += 1;
        cell.classList.add("ok");
        statusEl.textContent = "Correcto";
      });

      if (validCount === 9) {
        scoreEl.textContent = "Perfecto. Puntuacion: 9/9";
      } else {
        scoreEl.textContent = "Puntuacion: " + validCount + "/9";
      }

      saveProgress();
    }

    function clearBoard() {
      getCells().forEach((cell) => {
        clearCellVisual(cell);
        cell.querySelector("input").value = "";
      });
      scoreEl.textContent = "Aun no has comprobado el tablero.";
      saveProgress();
    }

    function attachInputHandlers() {
      tableEl.querySelectorAll(".cell input").forEach((inputEl) => {
        inputEl.addEventListener("input", () => {
          const cell = inputEl.closest(".cell");
          clearCellVisual(cell);
          saveProgress();
        });

        inputEl.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            checkBoard();
          }
        });
      });
    }

    function renderBoard() {
      let html = "<thead><tr><th>Club x Club</th>";
      for (const col of state.cols) {
        html += "<th>" + col + "</th>";
      }
      html += "</tr></thead><tbody>";

      state.rows.forEach((row, rowIndex) => {
        html += "<tr><th class=\"row-head\">" + row + "</th>";

        state.cols.forEach((col, colIndex) => {
          const hint = state.hints ? new Set(optionsForPair(row, col)).size + " opciones" : "";
          html +=
            "<td><div class=\"cell\" data-row=\"" + rowIndex + "\" data-col=\"" + colIndex +
            "\"><input type=\"text\" placeholder=\"Jugador\" autocomplete=\"off\" spellcheck=\"false\">" +
            "<div class=\"hint\">" + hint + "</div><div class=\"status\"></div></div></td>";
        });

        html += "</tr>";
      });

      html += "</tbody>";
      tableEl.innerHTML = html;
      attachInputHandlers();
    }

    function openBoard(boardData, boardKey, boardLabel, restoreProgress) {
      state.rows = [...boardData.rows];
      state.cols = [...boardData.cols];
      state.boardKey = boardKey;
      state.boardLabel = boardLabel;
      state.attempts = 0;

      if (!restoreProgress) {
        state.hints = false;
      }

      const progress = restoreProgress ? loadProgress(boardKey) : null;
      if (progress) {
        state.attempts = Number(progress.attempts) || 0;
        state.hints = Boolean(progress.hints);
      }

      renderBoard();

      if (progress) {
        applyValues(progress.values);
        scoreEl.textContent = "Progreso recuperado.";
      } else {
        scoreEl.textContent = "Aun no has comprobado el tablero.";
      }

      updateMeta();
      refreshHintButton();
      refreshHints();
      saveProgress();
    }

    function loadDaily() {
      const now = new Date();
      const seedText = now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate();
      const board = generateBoard(hashText(seedText));
      openBoard(board, "daily-" + seedText, "Reto de hoy", true);
    }

    function loadRandom() {
      const seed = Date.now() >>> 0;
      const board = generateBoard(seed);
      openBoard(board, "random-" + seed, "Grid aleatorio", false);
    }

    function boot() {
      buildIndex();
      loadDaily();

      document.getElementById("dailyBtn").addEventListener("click", loadDaily);
      document.getElementById("randomBtn").addEventListener("click", loadRandom);
      document.getElementById("checkBtn").addEventListener("click", checkBoard);
      document.getElementById("clearBtn").addEventListener("click", clearBoard);
      hintBtn.addEventListener("click", () => {
        state.hints = !state.hints;
        refreshHintButton();
        refreshHints();
        saveProgress();
      });
    }

    boot();
  </script>
</body>
</html>
